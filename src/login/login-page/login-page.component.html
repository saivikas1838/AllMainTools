<div class="neu-container">
  <div class="neu-card">

    <!-- Avatar -->
    <div class="neu-avatar">
      <i class="pi pi-user"></i>
    </div>

    <h1 class="title">Welcome back</h1>
    <p class="subtitle">Please sign in to continue</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSignIn()" class="form-body">

      <!-- Email Field -->
      <div class="neu-field-wrapper">
        <div class="neu-input-box"
             [class.focused]="emailFocused"
             [class.filled]="loginForm.get('email')?.value">
          <label class="floating-label">Email address</label>
          <div class="input-inner">
            <i class="pi pi-envelope field-icon"></i>
            <input
              type="email"
              formControlName="email"
              class="neu-input"
              autocomplete="email"
              (focus)="emailFocused = true"
              (blur)="emailFocused = false"
            />
          </div>
        </div>
      </div>

      <!-- Password Field -->
      <div class="neu-field-wrapper">
        <div class="neu-input-box"
             [class.focused]="passwordFocused"
             [class.filled]="loginForm.get('password')?.value">
          <label class="floating-label">Password</label>
          <div class="input-inner">
            <i class="pi pi-lock field-icon"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="neu-input neu-input--password"
              autocomplete="current-password"
              (focus)="passwordFocused = true"
              (blur)="passwordFocused = false"
            />
            <button type="button" class="toggle-eye"
                    (click)="showPassword = !showPassword"
                    tabindex="-1">
              <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Remember me + Forgot password -->
      <div class="row-between">
        <div class="remember-row">
          <button
            type="button"
            class="neu-toggle"
            [class.neu-toggle--on]="loginForm.get('rememberMe')?.value"
            (click)="toggleRememberMe()"
            role="switch"
            [attr.aria-checked]="loginForm.get('rememberMe')?.value"
          >
            <span class="neu-toggle__knob"></span>
          </button>
          <span class="remember-label">Remember me</span>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Sign In Button -->
      <button type="submit" class="neu-btn-primary">Sign In</button>

    </form>

    <!-- Divider -->
    <div class="divider-row">
      <span class="divider-line"></span>
      <span class="divider-text">OR CONTINUE WITH</span>
      <span class="divider-line"></span>
    </div>

    <!-- Social Buttons -->
    <div class="social-row">
      <button class="neu-social-btn" aria-label="Google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
      </button>
      <button class="neu-social-btn" aria-label="GitHub">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </button>
      <button class="neu-social-btn" aria-label="Twitter">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1DA1F2">
          <path d="M23.954 4.569a10 10 0 0 1-2.825.775 4.958 4.958 0 0 0 2.163-2.723 9.99 9.99 0 0 1-3.127 1.195 4.934 4.934 0 0 0-8.405 4.49A13.978 13.978 0 0 1 1.64 3.162a4.934 4.934 0 0 0 1.526 6.574 4.903 4.903 0 0 1-2.23-.616v.061a4.935 4.935 0 0 0 3.957 4.834 4.996 4.996 0 0 1-2.224.084 4.937 4.937 0 0 0 4.604 3.419A9.9 9.9 0 0 1 0 19.54a13.94 13.94 0 0 0 7.548 2.212c9.056 0 14.01-7.503 14.01-14.01 0-.213-.005-.426-.015-.637A9.936 9.936 0 0 0 24 4.59l-.046-.021z"/>
        </svg>
      </button>
    </div>

    <p class="signup-text">
      Don't have an account? <a href="#" class="signup-link">Sign up</a>
    </p>

  </div>
</div>
